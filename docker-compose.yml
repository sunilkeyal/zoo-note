services:
  mongo:
    image: mongo:7
    container_name: notes-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  app:
    build: .
    container_name: notes-app
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      - MONGODB_URI=mongodb://mongo:27017/notes-app
      - AUTH_URL=http://localhost:3000
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo-data:
